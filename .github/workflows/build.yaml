name: Build and Publish

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  ARCHITECTURES: '["amd64", "aarch64"]'
  IMAGE_NAME: sonos-http-api
  REGISTRY_PREFIX: ghcr.io/${{ github.repository_owner }}

permissions:
  contents: write

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  release:
    name: Create release
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      created: ${{ steps.check.outputs.created }}
      registry_prefix: ${{ steps.lower.outputs.registry_prefix }}
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase registry prefix
        id: lower
        run: |
          echo "registry_prefix=$(echo '${{ env.REGISTRY_PREFIX }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Extract version from config.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' sonos-http-api/config.yaml | sed 's/version: *"\(.*\)"/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if release exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" > /dev/null 2>&1; then
            echo "Release v${{ steps.version.outputs.version }} already exists, skipping."
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: steps.check.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "Release v${VERSION}"

  init:
    name: Initialize container build
    needs: release
    if: needs.release.outputs.created == 'true'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Get build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.03.2
        with:
          architectures: ${{ env.ARCHITECTURES }}
          image-name: ${{ env.IMAGE_NAME }}
          registry-prefix: ${{ needs.release.outputs.registry_prefix }}

  build-container:
    name: Build ${{ matrix.arch }} container
    needs: [release, init]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.init.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        uses: home-assistant/builder/actions/build-image@2026.03.2
        with:
          arch: ${{ matrix.arch }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image: ${{ matrix.image }}
          image-tags: |
            ${{ needs.release.outputs.version }}
            latest
          push: "true"
          version: ${{ needs.release.outputs.version }}
          context: sonos-http-api

  manifest:
    name: Publish multi-arch manifest
    needs: [release, init, build-container]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.03.2
        with:
          architectures: ${{ env.ARCHITECTURES }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ env.IMAGE_NAME }}
          registry-prefix: ${{ needs.release.outputs.registry_prefix }}
          image-tags: |
            ${{ needs.release.outputs.version }}
            latest

      - name: Update release with image references
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          PREFIX="${{ needs.release.outputs.registry_prefix }}"
          EXISTING=$(gh release view "v${VERSION}" --json body -q .body)
          IMAGES=$(cat <<EOF

          ---

          ### Container Images

          \`\`\`
          docker pull ${PREFIX}/sonos-http-api:${VERSION}
          \`\`\`

          | Image | Tag |
          |-------|-----|
          | \`${PREFIX}/sonos-http-api\` | \`${VERSION}\`, \`latest\` |
          | \`${PREFIX}/amd64-sonos-http-api\` | \`${VERSION}\`, \`latest\` |
          | \`${PREFIX}/aarch64-sonos-http-api\` | \`${VERSION}\`, \`latest\` |
          EOF
          )
          gh release edit "v${VERSION}" --notes "${EXISTING}${IMAGES}"
