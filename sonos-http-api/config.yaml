name: "Sonos HTTP API"
description: "Control your Sonos system via a simple HTTP API with modern web UI and interactive API docs"
version: "2.0.7"
slug: "sonos_http_api"
image: "ghcr.io/tma84/sonos-http-api"
arch:
  - aarch64
  - amd64
url: "https://github.com/TMA84/node-sonos-http-api"
startup: services
init: false
hassio_api: true
host_network: true
ingress: true
ingress_port: 5005
panel_icon: "mdi:speaker-multiple"
panel_title: "Sonos API"
webui: "http://[HOST]:[PORT:5005]/"
ports:
  5005/tcp: 5005
ports_description:
  5005/tcp: "Sonos HTTP API"
map:
  - type: addon_config
    read_only: false
options:
  announce_volume: 40
schema:
  announce_volume: "int(1,100)"
