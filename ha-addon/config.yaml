name: "Sonos HTTP API"
version: "2.0.0"
slug: sonos-http-api
description: >-
  Control your Sonos system via a simple HTTP API. Provides endpoints for
  playback control, volume, grouping, favorites, playlists, TTS, and more.
  Includes a modern web UI and interactive API documentation.
arch:
  - amd64
  - aarch64
url: "https://github.com/TMA84/node-sonos-http-api"
startup: application
boot: auto
host_network: true
ports:
  5005/tcp: 5005
ports_description:
  5005/tcp: "Sonos HTTP API web interface and REST API"
webui: "http://[HOST]:[PORT:5005]"
map:
  - type: addon_config
    read_only: false
options:
  port: 5005
  announce_volume: 40
schema:
  port: "port"
  announce_volume: "int(1,100)"
image: "ghcr.io/tma84/sonos-http-api-{arch}"
